# Streamlit theme — tokens referenced in README (UI theme section).
# Accent: primaryColor. Neutrals: background + secondaryBackground + textColor.

[server]
headless = true
enableCORS = false
port = 8501

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#0f766e"
backgroundColor = "#fafafa"
secondaryBackgroundColor = "#ffffff"
textColor = "#1e293b"
font = "sans serif"
